<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密日记 - FangCun OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 28%),
                linear-gradient(180deg, #161616 0%, #0E0E0E 100%);
            color: #E0E0E0;
            font-family: "Noto Serif SC", "Songti SC", serif;
            min-height: 100vh;
            overflow: hidden;
        }

        #lockScreen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #lockScreen.unlocked {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .fingerprint-area {
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.12);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fingerprint-area::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .fingerprint-area svg {
            width: 44px;
            height: 44px;
            stroke: #555;
            transition: stroke 0.3s ease, filter 0.3s ease;
        }

        .fingerprint-area.scanning {
            background: rgba(255,255,255,0.04);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 24px rgba(255,255,255,0.08);
        }

        .fingerprint-area.scanning svg {
            stroke: #F3F3F3;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.35));
        }

        .lock-text {
            margin-top: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: #777;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: max(60px, env(safe-area-inset-top)) 24px 60px;
            height: 100vh;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .app-container::-webkit-scrollbar { display: none; }

        body.is-unlocked .app-container {
            opacity: 1;
            transform: translateY(0);
        }

        .top-nav {
            position: fixed;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 100;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: #777;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }

        .diary-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .diary-date {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #FFF;
            margin-bottom: 8px;
        }

        .diary-meta {
            font-size: 12px;
            color: #777;
            letter-spacing: 1px;
        }

        .diary-content {
            font-size: 16px;
            line-height: 2.2;
            color: #CCC;
            text-align: justify;
            letter-spacing: 0.5px;
        }

        .diary-content p {
            margin-bottom: 20px;
            text-indent: 2em;
        }

        .diary-status {
            text-align: center;
            color: #555;
            text-indent: 0;
        }

        .scratch-block {
            display: inline;
            background-color: #2A2A2A;
            color: transparent;
            border-radius: 2px;
            padding: 0 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.4s ease;
            position: relative;
        }

        .scratch-block.revealed {
            background-color: transparent;
            color: #A33333;
            text-decoration: line-through;
            text-decoration-color: rgba(163, 51, 51, 0.5);
            text-shadow: 0 0 10px rgba(163, 51, 51, 0.2);
        }

        .refresh-btn {
            display: block;
            margin: 40px auto 0;
            background: transparent;
            border: 1px solid #333;
            color: #777;
            padding: 10px 24px;
            border-radius: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .refresh-btn:active:not(:disabled) {
            background: #222;
        }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="fingerprint-area" id="fingerprintBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 12v.01"></path>
                <path d="M9 10a3 3 0 0 1 6 0"></path>
                <path d="M6 10a6 6 0 0 1 12 0v2"></path>
                <path d="M3 10a9 9 0 0 1 18 0v2a5 5 0 0 1-5 5h-1"></path>
                <path d="M9 14v4a2 2 0 0 0 2 2h1"></path>
                <path d="M12 21a5 5 0 0 1-5-5v-1"></path>
            </svg>
        </div>
        <div class="lock-text" id="lockText">Hold to Unlock</div>
    </div>

    <div class="top-nav">
        <a href="FangCun.html" class="back-btn" id="backBtn">‹</a>
    </div>

    <div class="app-container">
        <div class="diary-header">
            <div class="diary-date" id="diaryDate">--</div>
            <div class="diary-meta" id="diaryMeta">-- | --</div>
        </div>
        <div class="diary-content" id="diaryContent">
            <p class="diary-status">正在读取潜意识...</p>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button">重新推演</button>
    </div>

    <script src="../js/secret-center-core.js"></script>
    <script>
        const SCENE_KEY = 'shadow_diary';
        let pressTimer = null;
        let currentRoleId = '';
        let hasLoadedDiary = false;

        const lockScreen = document.getElementById('lockScreen');
        const fingerprintBtn = document.getElementById('fingerprintBtn');
        const lockText = document.getElementById('lockText');
        const diaryDate = document.getElementById('diaryDate');
        const diaryMeta = document.getElementById('diaryMeta');
        const diaryContent = document.getElementById('diaryContent');
        const refreshBtn = document.getElementById('refreshBtn');

        function asString(value) {
            return String(value == null ? '' : value).trim();
        }

        function escapeHtml(text) {
            return asString(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function setDiaryStatus(text) {
            diaryContent.innerHTML = `<p class="diary-status">${escapeHtml(text)}</p>`;
        }

        function resolveContext() {
            if (window.SecretCenterCore && typeof window.SecretCenterCore.resolveRoleContext === 'function') {
                const resolved = window.SecretCenterCore.resolveRoleContext();
                if (resolved && resolved.ok) return resolved;
            }
            return {
                roleId: localStorage.getItem('SecretCenter_CurrentRoleId') || '',
                roleName: localStorage.getItem('SecretCenter_CurrentRoleName') || localStorage.getItem('FangCun_CurrentRole') || ''
            };
        }

        function readCachedDiary(roleId) {
            if (!roleId || !window.SecretCenterCore || typeof window.SecretCenterCore.readSceneCache !== 'function') {
                return null;
            }
            const cached = window.SecretCenterCore.readSceneCache(SCENE_KEY, roleId);
            return cached && cached.data && cached.data.diary ? cached.data.diary : null;
        }

        function renderDiary(diary) {
            const data = diary || {};
            diaryDate.textContent = asString(data.date) || '--';
            diaryMeta.textContent = `${asString(data.weather) || '--'} / ${asString(data.mood) || '--'}`;

            let safeHTML = escapeHtml(asString(data.content));
            safeHTML = safeHTML.replace(/&lt;scratch&gt;/g, '<span class="scratch-block">');
            safeHTML = safeHTML.replace(/&lt;\/scratch&gt;/g, '</span>');

            const paragraphs = safeHTML.split(/\n+/).filter(function (part) {
                return asString(part);
            });
            diaryContent.innerHTML = paragraphs.length
                ? paragraphs.map(function (part) { return `<p>${part}</p>`; }).join('')
                : '<p class="diary-status">这一页还空着。</p>';

            diaryContent.querySelectorAll('.scratch-block').forEach(function (node) {
                node.addEventListener('click', function () {
                    node.classList.add('revealed');
                });
            });
        }

        function showGenerationFailure(message) {
            const reason = asString(message) || '本次没有生成出可展示的私密日记。';
            if (window.SecretCenterCore && typeof window.SecretCenterCore.showGenerationErrorDialog === 'function') {
                window.SecretCenterCore.showGenerationErrorDialog(reason, '私密日记');
                return;
            }
            alert(reason);
        }

        async function fetchDiary(force) {
            hasLoadedDiary = true;
            if (!currentRoleId) {
                showGenerationFailure('请先选择角色，再查看私密日记。');
                return;
            }

            if (refreshBtn) refreshBtn.disabled = true;
            if (force === true) setDiaryStatus('正在窥探他的内心...');

            try {
                const result = await window.SecretCenterCore.generateShadowDiaryContent({
                    roleId: currentRoleId,
                    force: force === true
                });
                if (result && result.ok && result.data && result.data.diary) {
                    renderDiary(result.data.diary);
                    return;
                }
                const cachedDiary = readCachedDiary(currentRoleId);
                if (cachedDiary) renderDiary(cachedDiary);
                showGenerationFailure(result && result.error);
            } catch (error) {
                const cachedDiary = readCachedDiary(currentRoleId);
                if (cachedDiary) renderDiary(cachedDiary);
                showGenerationFailure(error && error.message);
            } finally {
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        function unlockDiary() {
            lockText.textContent = 'Access Granted';
            lockText.style.color = '#FFF';
            setTimeout(function () {
                lockScreen.classList.add('unlocked');
                document.body.classList.add('is-unlocked');
                if (!hasLoadedDiary) fetchDiary(false);
            }, 400);
        }

        function startUnlock(event) {
            if (event.type === 'touchstart') event.preventDefault();
            fingerprintBtn.classList.add('scanning');
            lockText.textContent = 'Scanning...';
            pressTimer = setTimeout(unlockDiary, 800);
        }

        function cancelUnlock() {
            clearTimeout(pressTimer);
            if (!lockScreen.classList.contains('unlocked')) {
                fingerprintBtn.classList.remove('scanning');
                lockText.textContent = 'Hold to Unlock';
            }
        }

        fingerprintBtn.addEventListener('mousedown', startUnlock);
        fingerprintBtn.addEventListener('touchstart', startUnlock, { passive: false });
        fingerprintBtn.addEventListener('mouseup', cancelUnlock);
        fingerprintBtn.addEventListener('touchend', cancelUnlock);
        fingerprintBtn.addEventListener('mouseleave', cancelUnlock);
        fingerprintBtn.addEventListener('touchcancel', cancelUnlock);

        refreshBtn.addEventListener('click', function () {
            fetchDiary(true);
        });

        document.getElementById('backBtn').addEventListener('click', function (event) {
            event.preventDefault();
            window.location.href = 'FangCun.html';
        });

        (function init() {
            const context = resolveContext();
            currentRoleId = asString(context.roleId);
            const cachedDiary = readCachedDiary(currentRoleId);
            if (cachedDiary) {
                renderDiary(cachedDiary);
            } else {
                setDiaryStatus('正在读取潜意识...');
            }
        })();
    </script>
</body>
</html>
