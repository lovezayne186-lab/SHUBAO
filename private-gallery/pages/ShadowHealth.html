<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康与运动 - FangCun OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #F2F2F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #000; padding-bottom: 40px; }
        .app-container { max-width: 420px; margin: 0 auto; padding: 40px 20px 20px; }
        .header { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .header.back { cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .card { background: #FFF; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-header { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        .label-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .color-steps { background: #FF9500; }
        .color-cal { background: #FF2D55; }
        .color-sleep { background: #5856D6; }
        .color-heart { background: #FF3B30; }
        .color-workout { background: #34C759; }
        .big-number { font-size: 28px; font-weight: bold; font-family: "Helvetica Neue", sans-serif; }
        .unit { font-size: 14px; color: #888; font-weight: normal; }
        .sleep-card { background: linear-gradient(135deg, #1C1C1E, #2C2C2E); color: #FFF; margin-bottom: 15px; }
        .sleep-card .unit { color: #AAA; }
        .sleep-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .sleep-score { width: 62px; height: 62px; border-radius: 31px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .sleep-score strong { font-size: 22px; line-height: 1; }
        .sleep-score span { font-size: 10px; color: #BBB; margin-top: 4px; }
        .sleep-note { margin-top: 10px; font-size: 12px; color: #FF9F0A; font-weight: 500; line-height: 1.5; }
        .sleep-times { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; color: #CCC; border-top: 1px solid #444; padding-top: 10px; gap: 12px; }
        .sleep-stages { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
        .stage { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 12px; }
        .stage-label { font-size: 11px; color: #BDBDC7; margin-bottom: 4px; }
        .stage-value { font-size: 18px; font-weight: 700; }
        .heart-anomaly { background: #FFEFEF; border-left: 4px solid #FF3B30; padding: 10px; margin-top: 12px; border-radius: 4px; font-size: 13px; color: #C62828; line-height: 1.5; }
        .workout-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F0F0F0; gap: 12px; }
        .workout-item:last-child { border-bottom: none; }
        .wk-icon { font-size: 14px; color: #34C759; background: #E5F9E0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wk-info { flex: 1; min-width: 0; }
        .wk-title { font-size: 15px; font-weight: 600; }
        .wk-time { font-size: 12px; color: #888; }
        .wk-cal { font-size: 15px; font-weight: 600; color: #34C759; flex-shrink: 0; }
        .empty-state { color: #888; font-size: 14px; padding: 10px 0; text-align: center; }
        .generate-btn { position: fixed; top: 20px; right: 20px; font-size: 16px; color: #007AFF; text-decoration: none; font-weight: 600; border: none; background: transparent; cursor: pointer; padding: 0; }
        .generate-btn:disabled { opacity: 0.45; cursor: default; }
    </style>
</head>
<body>
    <button class="generate-btn" id="generateBtn" type="button">生成</button>
    <div class="app-container">
        <div class="header back" id="summaryBackBtn">摘要</div>
        <div id="healthContent"></div>
    </div>

    <script src="../js/secret-center-core.js"></script>
    <script>
        function asString(value) { return String(value == null ? '' : value).trim(); }
        function escapeHtml(text) {
            return asString(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function showGenerationFailure(message) {
            const reason = asString(message) || '本次没有生成出可展示的运动与健康数据。';
            if (window.SecretCenterCore && typeof window.SecretCenterCore.showGenerationErrorDialog === 'function') {
                window.SecretCenterCore.showGenerationErrorDialog(reason, '运动与健康');
                return;
            }
            alert(reason);
        }
        async function loadHealth(force) {
            const container = document.getElementById('healthContent');
            const btn = document.getElementById('generateBtn');
            if (!window.SecretCenterCore || typeof window.SecretCenterCore.generateShadowHealthContent !== 'function') {
                showGenerationFailure('核心模块未加载，暂时无法生成。');
                return;
            }
            const roleId = window.SecretCenterCore.getSelectedRoleId();
            if (!roleId) {
                showGenerationFailure('请先选择角色，再查看运动与健康。');
                return;
            }
            container.innerHTML = '<div class="empty-state" style="padding:48px 0;">正在同步健康数据...</div>';
            try {
                if (btn) btn.disabled = true;
                const res = await window.SecretCenterCore.generateShadowHealthContent({ roleId: roleId, force: force === true });
                if (res && res.ok && res.data) {
                    const h = res.data;
                    const workouts = Array.isArray(h.workouts) ? h.workouts : [];
                    container.innerHTML =
                        '<div class="grid-2">' +
                            '<div class="card"><div class="card-header"><span class="label-dot color-steps"></span>步数</div><div class="big-number">' + escapeHtml(h.overview && h.overview.steps) + ' <span class="unit">步</span></div></div>' +
                            '<div class="card"><div class="card-header"><span class="label-dot color-cal"></span>活动能量</div><div class="big-number">' + escapeHtml(h.overview && h.overview.calories) + ' <span class="unit">千卡</span></div></div>' +
                        '</div>' +
                        '<div class="card sleep-card">' +
                            '<div class="sleep-head">' +
                                '<div><div class="card-header"><span class="label-dot color-sleep"></span>睡眠</div><div class="big-number">' + escapeHtml(h.sleep && h.sleep.duration) + '</div></div>' +
                                '<div class="sleep-score"><strong>' + escapeHtml(h.sleep && h.sleep.score || '--') + '</strong><span>评分</span></div>' +
                            '</div>' +
                            '<div class="sleep-note">状态：' + escapeHtml(h.sleep && h.sleep.quality) + ' | ' + escapeHtml(h.sleep && h.sleep.note) + '</div>' +
                            '<div class="sleep-times"><div>就寝: ' + escapeHtml(h.sleep && h.sleep.bedTime) + '</div><div>起床: ' + escapeHtml(h.sleep && h.sleep.wakeTime) + '</div></div>' +
                            '<div class="sleep-stages">' +
                                '<div class="stage"><div class="stage-label">深睡</div><div class="stage-value">' + escapeHtml(h.sleep && h.sleep.deep) + '</div></div>' +
                                '<div class="stage"><div class="stage-label">浅睡</div><div class="stage-value">' + escapeHtml(h.sleep && h.sleep.light) + '</div></div>' +
                                '<div class="stage"><div class="stage-label">快速眼动</div><div class="stage-value">' + escapeHtml(h.sleep && h.sleep.rem) + '</div></div>' +
                                '<div class="stage"><div class="stage-label">清醒</div><div class="stage-value">' + escapeHtml(h.sleep && h.sleep.awake) + '</div></div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="card" style="margin-bottom: 15px;">' +
                            '<div class="card-header"><span class="label-dot color-heart"></span>心率</div>' +
                            '<div style="display:flex; gap:20px;">' +
                                '<div><div class="unit">平均心率</div><div style="font-size:20px;font-weight:600;">' + escapeHtml(h.heartRate && h.heartRate.avg) + '</div></div>' +
                                '<div><div class="unit">最高心率</div><div style="font-size:20px;font-weight:600;color:#FF3B30;">' + escapeHtml(h.heartRate && h.heartRate.max) + '</div></div>' +
                            '</div>' +
                            (asString(h.heartRate && h.heartRate.anomaly) ? '<div class="heart-anomaly">' + escapeHtml(h.heartRate && h.heartRate.anomaly) + '</div>' : '') +
                        '</div>' +
                        '<div class="card">' +
                            '<div class="card-header"><span class="label-dot color-workout"></span>体能训练</div>' +
                            (workouts.length ? workouts.map(function (w) {
                                return '<div class="workout-item"><div class="wk-icon">训</div><div class="wk-info"><div class="wk-title">' + escapeHtml(w.type) + '</div><div class="wk-time">' + escapeHtml(w.time) + ' · ' + escapeHtml(w.duration) + '</div></div><div class="wk-cal">' + escapeHtml(w.burn) + '</div></div>';
                            }).join('') : '<div class="empty-state">近期无运动记录。</div>') +
                        '</div>';
                    return;
                }
                container.innerHTML = '';
                showGenerationFailure(res && res.error);
            } catch (error) {
                container.innerHTML = '';
                console.error('ShadowHealth generate failed:', error);
                showGenerationFailure(error && error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }
        document.getElementById('summaryBackBtn').addEventListener('click', function () {
            window.location.href = 'FangCun.html';
        });
        document.getElementById('generateBtn').addEventListener('click', function () {
            loadHealth(true);
        });
        window.onload = function () {
            loadHealth(false);
        };
    </script>
</body>
</html>
