<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通话记录 - FangCun OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #F7F6F2; font-family: "Georgia", -apple-system, serif; color: #33312E; padding-bottom: 40px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #8C8881; font-size: 24px; font-weight: 300; z-index: 100; -webkit-tap-highlight-color: transparent; }
        .generate-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            border: none; background: transparent; color: #111;
            font-size: 20px; line-height: 1; padding: 6px; cursor: pointer;
            font-weight: 600;
        }
        .generate-btn:disabled { opacity: 0.45; cursor: default; }
        
        .app-container { max-width: 420px; margin: 0 auto; padding: 70px 24px 20px; }
        
        .header { font-size: 28px; font-weight: 600; font-family: -apple-system, sans-serif; letter-spacing: 0.5px; margin-bottom: 24px; color: #33312E; }

        .call-list { display: flex; flex-direction: column; }
        .call-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid rgba(213, 209, 200, 0.5); cursor: pointer; transition: opacity 0.2s; }
        .call-item:active { opacity: 0.5; }

        .call-info { flex: 1; }
        .caller-name { font-size: 17px; font-weight: 500; font-family: -apple-system, sans-serif; color: #33312E; margin-bottom: 4px; }
        .caller-name.missed { color: #C95A49; } 
        
        .call-meta { font-size: 13px; color: #8C8881; font-family: -apple-system, sans-serif; display: flex; align-items: center; gap: 6px; }
        .call-time { font-size: 14px; color: #A3A09A; text-align: right; }
        .icon-type { font-size: 12px; }

        /* 详情弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: none; align-items: flex-end; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content { background: #F7F6F2; width: 100%; border-radius: 24px 24px 0 0; padding: 30px 24px 40px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .m-header { text-align: center; margin-bottom: 24px; }
        .m-name { font-size: 22px; font-weight: 600; font-family: -apple-system, sans-serif; color: #33312E; margin-bottom: 8px; }
        .m-meta { font-size: 14px; color: #8C8881; font-family: -apple-system, sans-serif; }
        
        .m-detail-box { background: rgba(255,255,255,0.6); border: 1px solid rgba(213, 209, 200, 0.8); border-radius: 16px; padding: 20px; font-family: -apple-system, sans-serif; font-size: 15px; line-height: 1.6; color: #5A5752; position: relative; }
        .m-detail-box::before { content: '“'; position: absolute; top: -10px; left: 10px; font-size: 40px; font-family: Georgia, serif; color: #D5D1C8; line-height: 1; }
        
        .close-bar { width: 40px; height: 5px; background: #D5D1C8; border-radius: 3px; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <a href="FangCun.html" class="back-btn">‹</a>
    <button class="generate-btn" id="generateBtn" type="button" aria-label="生成">✦</button>
    
    <div class="app-container">
        <div class="header">通话记录</div>
        <div class="call-list" id="callList">
            <p style="text-align:center; color:#A3A09A; font-family:-apple-system,sans-serif; margin-top: 40px;">正在获取基站数据...</p>
        </div>
    </div>

    <!-- 通话详情弹窗 -->
    <div class="modal-overlay" id="callModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-bar"></div>
            <div class="m-header">
                <div class="m-name" id="mName">未知号码</div>
                <div class="m-meta" id="mMeta">昨天 23:14 · 呼出 · 2小时</div>
            </div>
            <div class="m-detail-box" id="mDetail">
                <!-- 详细描述 -->
            </div>
        </div>
    </div>

    <script src="../js/secret-center-core.js"></script>
    <script>
        let callsData = [];
        function asString(value) { return String(value == null ? '' : value).trim(); }

        function getTypeIcon(type) {
            if (type.includes('未接') || type.includes('拒接')) return '<span class="icon-type">📞✖</span>';
            if (type.includes('呼出')) return '<span class="icon-type">↗</span>';
            return '<span class="icon-type">↙</span>';
        }

        function showGenerationFailure(message) {
            const reason = asString(message) || '本次没有生成出可展示的通话记录。';
            if (window.SecretCenterCore && typeof window.SecretCenterCore.showGenerationErrorDialog === 'function') {
                window.SecretCenterCore.showGenerationErrorDialog(reason, '通话记录');
                return;
            }
            alert(reason);
        }

        async function loadCalls(force) {
            const btn = document.getElementById('generateBtn');
            const mount = document.getElementById('callList');
            if (!window.SecretCenterCore || typeof window.SecretCenterCore.generateShadowCallsContent !== 'function') {
                showGenerationFailure('核心模块未加载，暂时无法生成。');
                return;
            }
            const roleId = asString(window.SecretCenterCore.getSelectedRoleId ? window.SecretCenterCore.getSelectedRoleId() : '');
            if (!roleId) {
                showGenerationFailure('请先选择角色，再查看通话记录。');
                return;
            }
            try {
                if (btn) btn.disabled = true;
                const res = await window.SecretCenterCore.generateShadowCallsContent({ roleId: roleId, force: force === true });
                if (res && res.ok && res.data && Array.isArray(res.data.calls) && res.data.calls.length) {
                    callsData = res.data.calls;
                    mount.innerHTML = callsData.map((c, idx) => {
                        const isMissed = c.type.includes('未接') || c.type.includes('拒接');
                        const nameClass = isMissed ? 'caller-name missed' : 'caller-name';
                        return `
                            <div class="call-item" onclick="openModal(${idx})">
                                <div class="call-info">
                                    <div class="${nameClass}">${c.name}</div>
                                    <div class="call-meta">
                                        ${getTypeIcon(c.type)} ${c.type} · ${c.duration}
                                    </div>
                                </div>
                                <div class="call-time">${c.time}</div>
                            </div>
                        `;
                    }).join('');
                    return;
                }
                mount.innerHTML = '';
                showGenerationFailure(res && res.error);
            } catch (error) {
                mount.innerHTML = '';
                showGenerationFailure(error && error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        function openModal(idx) {
            const c = callsData[idx];
            document.getElementById('mName').innerText = c.name;
            document.getElementById('mMeta').innerText = `${c.time} · ${c.type} · ${c.duration}`;
            document.getElementById('mDetail').innerText = c.detail;
            document.getElementById('callModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('callModal').classList.remove('active');
        }

        document.getElementById('generateBtn').addEventListener('click', function () {
            loadCalls(true);
        });

        window.onload = function () {
            loadCalls(false);
        };
    </script>
</body>
</html>
