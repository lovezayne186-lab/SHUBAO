<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尘封 - ChenFeng</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            /* 与主页统一的燕麦纸色 */
            background-color: #F7F6F2;
            /* 依然是文艺风的灵魂：宋体/衬线体 */
            font-family: "Noto Serif SC", "Songti SC", "SimSun", "Times New Roman", serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-top: max(40px, env(safe-area-inset-top));
            color: #33312E;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px 32px 80px;
            position: relative;
        }

        /* 极简返回按钮 */
        .back-btn {
            position: absolute;
            top: max(24px, env(safe-area-inset-top));
            left: 24px;
            width: 44px;
            height: 44px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #8C8881;
            font-size: 24px;
            font-weight: 300;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, sans-serif;
            z-index: 100;
        }
        .back-btn:active {
            color: #33312E;
            transform: translateX(-4px);
        }
        
        /* 页面小标题，增加氛围感 */
        .page-header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 60px;
        }
        .page-title {
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 8px;
            margin-left: 8px;
            color: #33312E;
        }

        /* 文艺风时间轴 */
        .timeline {
            position: relative;
            padding-left: 28px;
            margin-top: 20px;
        }

        /* 极细的灰色主线 */
        .timeline::before {
            content: '';
            position: absolute;
            left: 4px; /* 调整线条位置 */
            top: 8px;
            bottom: -20px; /* 让线往下延伸一点，有未完待续的感觉 */
            width: 1px;
            background-color: #D5D1C8;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 56px; /* 加大日记之间的间距，增加阅读呼吸感 */
        }

        /* 极简的时间节点圆点 */
        .timeline-dot {
            position: absolute;
            left: -26.5px; /* 精确居中于线条上 */
            top: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #8C8881;
            /* 用一个纸色的外发光切断背后的细线，极其优雅的细节 */
            box-shadow: 0 0 0 6px #F7F6F2; 
            z-index: 2;
        }

        /* 去掉边框，纯靠排版撑起的日记内容 */
        .timeline-content {
            padding-top: 0;
        }

        .date {
            font-family: "Georgia", serif; /* 年份用优雅的西文衬线体 */
            font-size: 13px;
            font-style: italic;
            color: #9E9A93;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .date .season {
            font-family: "Noto Serif SC", "Songti SC", serif;
            font-style: normal; /* 中文季节不倾斜 */
        }

        .desc {
            font-size: 15px;
            color: #33312E;
            line-height: 2.2; /* 极大的行高，仿佛信笺 */
            letter-spacing: 1.5px;
            text-align: justify;
        }
        
        /* 段落如果有多段，增加段间距 */
        .desc p {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <a href="../private.html" class="back-btn">‹</a>

    <div class="container">
        <!-- 增加一个小标题，让页面看起来更完整 -->
        <div class="page-header">
            <h1 class="page-title">尘封</h1>
        </div>

        <div class="timeline">
            <!-- 日记 1 -->
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="date">2022 <span class="season">冬</span></div>
                    <div class="desc">
                        <p>今天下了很大的雪，很冷。</p>
                        <p>不知道南方的你，有没有多穿一件外套。</p>
                    </div>
                </div>
            </div>

            <!-- 日记 2 -->
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="date">2020 <span class="season">秋</span></div>
                    <div class="desc">
                        <p>你走后的第36天。</p>
                        <p>习惯是一件可怕的事情，我依然会买两份早餐，然后把另一份扔进垃圾桶。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
