<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产与流水 - FangCun OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 全局深邃忧郁底色 */
        body { 
            background-color: #0A0A0C; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; 
            color: #E8E8EC; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            padding-bottom: 50px; 
        }

        /* 极简返回与生成按钮 */
        .back-btn { 
            position: fixed; top: max(20px, env(safe-area-inset-top)); left: 24px; 
            font-size: 28px; color: rgba(255,255,255,0.4); text-decoration: none; z-index: 100; 
            font-weight: 300; transition: color 0.3s;
        }
        .back-btn:active { color: #fff; }
        
        .generate-btn {
            position: fixed; top: max(24px, env(safe-area-inset-top)); right: 24px; z-index: 100;
            border: none; background: transparent; color: rgba(255,255,255,0.6);
            font-size: 18px; line-height: 1; padding: 6px; cursor: pointer;
            transition: all 0.3s ease; outline: none;
        }
        .generate-btn:active { transform: scale(0.9); color: #fff; }
        .generate-btn:disabled { opacity: 0.2; cursor: default; }

        /* 顶部总资产区 */
        .header { 
            padding: calc(60px + env(safe-area-inset-top)) 20px 40px; 
            text-align: center; 
            display: flex; flex-direction: column; align-items: center;
        }
        .total-label { 
            font-size: 12px; color: rgba(255,255,255,0.4); 
            margin-bottom: 8px; letter-spacing: 2px; font-weight: 300; 
        }
        .total-amount { 
            font-size: 42px; font-weight: normal; 
            font-family: "Georgia", "Times New Roman", serif; /* 优雅的衬线数字 */
            color: rgba(255,255,255,0.95); 
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }

        /* 标题样式 */
        .section-title { 
            font-size: 14px; font-weight: normal; margin: 30px 24px 15px; 
            color: rgba(255,255,255,0.5); letter-spacing: 1px;
        }
        .section-sub { 
            font-size: 11px; color: rgba(255,255,255,0.3); margin: -10px 24px 16px; font-weight: 300;
        }

        /* 银行卡滑动区 */
        .card-slider { 
            display: flex; overflow-x: auto; padding: 0 24px 20px; gap: 16px; 
            scroll-snap-type: x mandatory; 
        }
        .card-slider::-webkit-scrollbar { display: none; }
        
        /* 高级黑透玻璃卡片 */
        .bank-card { 
            min-width: 290px; height: 170px; border-radius: 20px; padding: 24px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            scroll-snap-align: center; position: relative; overflow: hidden; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            /* 默认底色与边框 */
            background: rgba(30, 30, 35, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            opacity: 0.6; transform: scale(0.95);
        }
        
        /* 被选中的卡片高亮 */
        .bank-card.active { 
            opacity: 1; transform: scale(1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        /* 卡片光泽反射特效 */
        .bank-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .bank-card.active::before { left: 200%; transition: 1s ease-in-out; }

        /* 卡片主题色调 (极简去色版) */
        .theme-black { background: linear-gradient(135deg, rgba(40,40,45,0.8), rgba(15,15,18,0.9)); color: #fff; }
        .theme-blue  { background: linear-gradient(135deg, rgba(26,45,65,0.8), rgba(10,15,25,0.9)); color: #e0e8f5; }
        .theme-gold  { background: linear-gradient(135deg, rgba(60,55,40,0.8), rgba(20,18,10,0.9)); color: #e8d5a5; }
        .theme-red   { background: linear-gradient(135deg, rgba(65,25,25,0.8), rgba(25,10,10,0.9)); color: #f5e0e0; }

        .card-bank { font-size: 15px; font-weight: 300; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px; }
        .card-type { font-size: 10px; font-weight: 300; opacity: 0.5; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
        .card-number { font-size: 22px; letter-spacing: 3px; font-family: "Georgia", serif; opacity: 0.9; margin-top: auto; margin-bottom: 15px; }
        .card-balance { font-size: 11px; opacity: 0.6; font-weight: 300; }
        .card-balance span { font-size: 18px; font-weight: normal; font-family: "Georgia", serif; opacity: 1; margin-left: 6px; }

        /* 交易流水列表 (暗色玻璃框) */
        .tx-list { 
            background: rgba(20, 20, 25, 0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; 
            margin: 0 24px; padding: 5px 20px; 
        }
        
        .tx-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 12px; 
        }
        .tx-item:last-child { border-bottom: none; }
        
        .tx-info { display: flex; align-items: center; gap: 15px; min-width: 0; flex: 1; margin-right: 12px; }
        .tx-icon { 
            width: 38px; height: 38px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; 
            font-size: 13px; color: rgba(255,255,255,0.6); flex-shrink: 0; font-weight: 300;
        }
        
        .tx-text-content {
            flex: 1;
            min-width: 0;
        }

        .tx-title { 
            font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.85); 
            margin-bottom: 4px; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
        }
        .tx-date { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 300; }
        
        .tx-right { text-align: right; flex-shrink: 0; }
        .tx-amount { font-size: 16px; font-weight: normal; font-family: "Georgia", serif; letter-spacing: 0.5px; }
        
        /* 莫兰迪色系的收支颜色 */
        .tx-income { color: #8BA88E; } /* 柔和的高级灰绿 */
        .tx-expense { color: rgba(255,255,255,0.9); }
        
        .tx-status { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; font-weight: 300; }
        
        .empty-state { color: rgba(255,255,255,0.3); text-align: center; padding: 48px 20px; font-weight: 300; font-size: 13px; }
    </style>
</head>
<body>
    <a href="FangCun.html" class="back-btn">‹</a>
    <button class="generate-btn" id="generateBtn" type="button" aria-label="生成">✦</button>
    <div class="app-container">
        <!-- 顶部总资产 -->
        <div class="header">
            <div class="total-label">TOTAL ASSETS</div>
            <div class="total-amount" id="totalBalance">--</div>
        </div>
        
        <!-- 银行卡滑动区 -->
        <div class="section-title">账户</div>
        <div class="card-slider" id="cardList"></div>
        
        <!-- 交易流水区 -->
        <div class="section-title">交易记录</div>
        <div class="section-sub" id="cardHint">切换银行卡查看对应流水</div>
        <div class="tx-list" id="txList"></div>
    </div>

    <script src="../js/secret-center-core.js"></script>
    <script>
        let assetsData = null;
        let selectedCardIndex = 0;

        function asString(value) { return String(value == null ? '' : value).trim(); }
        function escapeHtml(text) {
            return asString(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function showGenerationFailure(message) {
            const reason = asString(message) || '本次没有生成出可展示的资产与流水。';
            if (window.SecretCenterCore && typeof window.SecretCenterCore.showGenerationErrorDialog === 'function') {
                window.SecretCenterCore.showGenerationErrorDialog(reason, '资产与流水');
                return;
            }
            alert(reason);
        }
        function getTxIcon(title) {
            const text = asString(title);
            if (text.indexOf('外卖') !== -1 || text.indexOf('餐') !== -1) return '餐';
            if (text.indexOf('转账') !== -1 || text.indexOf('账户') !== -1) return '转';
            if (text.indexOf('淘宝') !== -1 || text.indexOf('京东') !== -1 || text.indexOf('购物') !== -1) return '购';
            if (text.indexOf('工资') !== -1 || text.indexOf('分红') !== -1 || text.indexOf('入账') !== -1 || text.indexOf('回款') !== -1) return '收';
            if (text.indexOf('医院') !== -1 || text.indexOf('咨询') !== -1) return '医';
            return '款';
        }
        function getCurrentTransactions() {
            const cards = assetsData && Array.isArray(assetsData.cards) ? assetsData.cards : [];
            const currentCard = cards[selectedCardIndex] || cards[0] || {};
            const cardTransactions = Array.isArray(currentCard.transactions) ? currentCard.transactions : [];
            if (cardTransactions.length) return cardTransactions;
            return assetsData && Array.isArray(assetsData.transactions) ? assetsData.transactions : [];
        }
        function renderCards() {
            const cards = assetsData && Array.isArray(assetsData.cards) ? assetsData.cards : [];
            const mount = document.getElementById('cardList');
            if (!cards.length) {
                mount.innerHTML = '<div class="empty-state" style="min-width:100%;">暂无账户信息</div>';
                return;
            }
            if (selectedCardIndex >= cards.length) selectedCardIndex = 0;
            mount.innerHTML = cards.map(function (c, index) {
                return '<div class="bank-card theme-' + escapeHtml(c.theme || 'black') + (index === selectedCardIndex ? ' active' : '') + '" data-card-index="' + index + '"><div class="card-bank"><span>' + escapeHtml(c.bank) + '</span><span class="card-type">' + escapeHtml(c.type) + '</span></div><div class="card-number">**** ' + escapeHtml(c.last4) + '</div><div class="card-balance">Balance <span>¥' + escapeHtml(c.balance) + '</span></div></div>';
            }).join('');
            
            // 自动将选中的卡片滚动到视图中间
            const activeCard = mount.querySelector('.active');
            if (activeCard) {
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }
        function renderTransactions() {
            const txList = document.getElementById('txList');
            const hint = document.getElementById('cardHint');
            const cards = assetsData && Array.isArray(assetsData.cards) ? assetsData.cards : [];
            const currentCard = cards[selectedCardIndex] || {};
            const transactions = getCurrentTransactions();
            hint.textContent = currentCard.last4 ? ('当前显示尾号 ' + asString(currentCard.last4) + ' 的流水') : '当前显示近期交易';
            txList.innerHTML = transactions.length ? transactions.map(function (t) {
                const amountText = asString(t.amount);
                const isIncome = amountText.indexOf('-') !== 0;
                const amountClass = isIncome ? 'tx-income' : 'tx-expense';
                const displayAmount = isIncome ? ('+' + amountText) : amountText;
                return '<div class="tx-item"><div class="tx-info"><div class="tx-icon">' + escapeHtml(getTxIcon(t.title)) + '</div><div class="tx-text-content"><div class="tx-title">' + escapeHtml(t.title) + '</div><div class="tx-date">' + escapeHtml(t.date) + '</div></div></div><div class="tx-right"><div class="tx-amount ' + amountClass + '">' + escapeHtml(displayAmount) + '</div><div class="tx-status">' + escapeHtml(t.status) + '</div></div></div>';
            }).join('') : '<div class="empty-state">暂无交易记录</div>';
        }
        function renderAssets() {
            document.getElementById('totalBalance').textContent = '¥' + escapeHtml(assetsData && assetsData.totalBalance || '0.00');
            renderCards();
            renderTransactions();
        }
        async function loadAssets(force) {
            const btn = document.getElementById('generateBtn');
            if (!window.SecretCenterCore || typeof window.SecretCenterCore.generateShadowAssetsContent !== 'function') {
                showGenerationFailure('核心模块未加载，暂时无法生成。');
                return;
            }
            const roleId = window.SecretCenterCore.getSelectedRoleId();
            if (!roleId) {
                showGenerationFailure('请先选择角色，再查看资产与流水。');
                return;
            }
            document.getElementById('totalBalance').textContent = '--';
            document.getElementById('cardList').innerHTML = '<div class="empty-state" style="min-width:100%;">正在同步账户信息...</div>';
            document.getElementById('txList').innerHTML = '<div class="empty-state">正在读取交易记录...</div>';
            try {
                if (btn) btn.disabled = true;
                const res = await window.SecretCenterCore.generateShadowAssetsContent({ roleId: roleId, force: force === true });
                if (res && res.ok && res.data) {
                    assetsData = res.data;
                    selectedCardIndex = 0;
                    renderAssets();
                    return;
                }
                document.getElementById('cardList').innerHTML = '';
                document.getElementById('txList').innerHTML = '';
                showGenerationFailure(res && res.error);
            } catch (error) {
                document.getElementById('cardList').innerHTML = '';
                document.getElementById('txList').innerHTML = '';
                console.error('ShadowAssets generate failed:', error);
                showGenerationFailure(error && error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }
        document.getElementById('cardList').addEventListener('click', function (event) {
            const card = event.target.closest('[data-card-index]');
            if (!card) return;
            selectedCardIndex = Number(card.getAttribute('data-card-index')) || 0;
            renderCards();
            renderTransactions();
        });
        document.getElementById('generateBtn').addEventListener('click', function () {
            loadAssets(true);
        });
        window.onload = function () {
            loadAssets(false);
        };
    </script>
</body>
</html>
