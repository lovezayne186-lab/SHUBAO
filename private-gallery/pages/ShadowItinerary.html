<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出行记录 - FangCun OS</title>
    <style>
        /* ================= 基础全局设置 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #F7F6F2;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            height: 100vh;
            display: flex; justify-content: center;
            color: #33312E; overflow: hidden;
        }

        .back-btn {
            position: fixed; top: max(20px, env(safe-area-inset-top)); left: 20px;
            width: 44px; height: 44px; background: transparent;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #8C8881;
            font-size: 24px; font-weight: 300;
            transition: all 0.3s ease; z-index: 9999; cursor: pointer;
        }

        .phone-screen {
            width: 100%; max-width: 420px; height: 100%;
            padding: max(60px, env(safe-area-inset-top)) 24px 40px;
            display: flex; flex-direction: column; position: relative;
        }

        /* ================= 顶部系统标识 ================= */
        .app-header { margin-bottom: 24px; padding-left: 8px; }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sys-name {
            font-family: "Georgia", "Noto Serif SC", serif;
            font-size: 20px; font-weight: bold; letter-spacing: 1px;
            color: #33312E; margin-bottom: 4px;
        }
        .sys-subtitle {
            font-size: 10px; letter-spacing: 2px;
            color: #A3A09A; text-transform: uppercase;
        }
        .header-date {
            font-family: "Georgia", serif;
            font-size: 11px;
            color: #8C8881;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .generate-btn {
            width: 44px; height: 44px; border: none; background: transparent;
            color: #33312E; font-size: 18px; cursor: pointer; flex-shrink: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .generate-btn:disabled { opacity: 0.55; cursor: default; }
        .generate-btn:active:not(:disabled) { transform: scale(0.98); }

        /* ================= 状态切换 Tab ================= */
        .status-tabs {
            display: flex; gap: 24px; margin-bottom: 24px; padding-left: 8px;
        }
        .tab {
            font-size: 13px; color: #A3A09A; cursor: pointer;
            padding-bottom: 4px; position: relative; transition: color 0.3s;
        }
        .tab.active { color: #33312E; font-weight: 500; }
        .tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 12px; height: 2px; background-color: #33312E;
        }

        /* 内容滚动区 */
        .content-area {
            flex: 1; overflow-y: auto; padding-bottom: 40px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* ================= 票根 (Ticket Stub) 核心 UI ================= */
        .ticket-card {
            background-color: #FFFFFF;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex; flex-direction: column;
            position: relative;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.02));
        }

        .ticket-top { padding: 24px; }
        
        .ticket-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 24px; font-family: "Georgia", serif;
        }
        .flight-no { font-size: 14px; font-weight: bold; color: #33312E; letter-spacing: 1px; }
        .vehicle-info { font-size: 10px; color: #8C8881; font-family: "PingFang SC", sans-serif; margin-top: 4px; letter-spacing: 0.5px;}
        .ticket-date { font-size: 11px; color: #8C8881; text-transform: uppercase; letter-spacing: 1px; }

        .route-info {
            display: flex; justify-content: space-between; align-items: center;
        }
        .city-group { display: flex; flex-direction: column; width: 35%; }
        .city-group.right { text-align: right; }
        .city {
            font-size: 20px; font-weight: bold; color: #33312E;
            font-family: "Noto Serif SC", serif; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .time { font-size: 18px; color: #5A5752; font-family: "Georgia", serif; }
        .airport { font-size: 10px; color: #A3A09A; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 连接线与交通工具图标 */
        .transport-line {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 8px; position: relative; top: -10px;
        }
        .duration { font-size: 10px; color: #A3A09A; margin-bottom: 4px; }
        .line {
            width: 100%; height: 1px; border-top: 1px dashed #D5D1C8; position: relative;
        }
        .icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #FFFFFF; padding: 0 6px; color: #8C8881;
        }

        /* 票根打孔分割线 */
        .ticket-divider {
            height: 1px; border-top: 1px dashed #E5E3DC;
            position: relative; width: 100%;
        }
        .ticket-divider::before, .ticket-divider::after {
            content: ''; position: absolute; top: -8px;
            width: 16px; height: 16px; background-color: #F7F6F2;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .ticket-divider::before { left: -8px; }
        .ticket-divider::after { right: -8px; }

        /* 票根下半部分 */
        .ticket-bottom {
            padding: 20px 24px; background-color: rgba(247, 246, 242, 0.3);
            border-radius: 0 0 12px 12px;
        }
        .seat-info {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            font-size: 12px; color: #5A5752; margin-bottom: 16px;
        }
        .seat-label { color: #A3A09A; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 2px;}
        
        .price-value { font-family: "Georgia", serif; color: #33312E; font-weight: bold;}

        .journey-link {
            display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px; margin-bottom: 14px; font-size: 12px; color: #5A5752;
        }
        .journey-link-value { line-height: 1.4; }
        
        .private-note {
            background: rgba(213, 209, 200, 0.15);
            border-left: 2px solid #33312E;
            padding: 12px 16px; border-radius: 0 4px 4px 0;
            margin-top: 16px;
        }
        .note-title {
            font-size: 10px; color: #8C8881; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
        }
        .note-content {
            font-size: 13px; color: #33312E; line-height: 1.5; font-family: "Noto Serif SC", serif;
        }

        .status-badge {
            display: inline-block; padding: 2px 8px; border-radius: 100px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .status-upcoming { background: #E8F0E6; color: #4A6741; }
        .status-completed { background: #F0E6E6; color: #8B4A4A; }

    </style>
</head>
<body>

    <a href="FangCun.html" class="back-btn" id="back-btn">‹</a>

    <div class="phone-screen">
        <div class="app-header">
            <div class="header-top">
                <div>
                    <div class="sys-name">ITINERARY</div>
                    <div class="sys-subtitle">Travel Footprints</div>
                </div>
                <div class="header-actions">
                    <div class="header-date" id="headerDate">-- ---</div>
                    <button class="generate-btn" id="generateBtn" type="button" aria-label="生成">✦</button>
                </div>
            </div>
        </div>

        <div class="status-tabs">
            <div class="tab active" data-tab="upcoming">Upcoming (0)</div>
            <div class="tab" data-tab="history">History (0)</div>
        </div>

        <div class="content-area" id="ticketContainer">
        </div>
    </div>

    <script src="../js/secret-center-core.js"></script>
    <script>
        const SCENE_KEY = 'shadow_itinerary';
        let currentTab = 'upcoming';
        let ticketData = [];
        let currentRoleId = '';

        function asString(value) {
            return String(value == null ? '' : value).trim();
        }

        function escapeHtml(text) {
            return asString(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getFilteredTickets() {
            return ticketData.filter(item => currentTab === 'upcoming' ? item.status === 'Upcoming' : item.status === 'Completed');
        }

        function formatHeaderDate() {
            const date = new Date();
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            return `${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]}`;
        }

        function updateHeaderDate() {
            const mount = document.getElementById('headerDate');
            if (mount) mount.textContent = formatHeaderDate();
        }

        function isSameCityTrip(item) {
            const fromCity = asString(item && item.from && item.from.city);
            const toCity = asString(item && item.to && item.to.city);
            return !!fromCity && fromCity === toCity;
        }

        function getDisplayLocation(item, side) {
            const point = item && item[side] ? item[side] : {};
            const sameCity = isSameCityTrip(item);
            const city = asString(point.city);
            const station = asString(point.station);
            if (sameCity) {
                return {
                    title: station || city || '未知地点',
                    subtitle: city || station || ''
                };
            }
            return {
                title: city || station || '未知地点',
                subtitle: station || city || ''
            };
        }

        function getSeatLabel(item) {
            return item && (item.type === 'car' || item.type === 'taxi') ? 'Position' : 'Seat';
        }

        // 新增渲染 汽车/打车 SVG 图标
        function renderTransportIcon(type) {
            if (type === 'train') {
                return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="16" rx="2" ry="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 19l-2 3"></path><path d="M16 19l2 3"></path><path d="M8 15h.01"></path><path d="M16 15h.01"></path></svg>';
            }
            if (type === 'car' || type === 'taxi') {
                // 汽车 SVG
                return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-4-3-4H9C7.3 6 6 10 6 10s-2.7.6-4.5 1.1c-.8.2-1.5 1-1.5 1.9v3c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><path d="M9 17h6"></path><circle cx="17" cy="17" r="2"></circle></svg>';
            }
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.7l-1.3 2.6c-.2.4.1.9.6 1.1l8.2 2.8L9 15l-3.2-.8c-.4-.1-.8.1-1 .5l-.8 1.6c-.2.4 0 .9.4 1.1L8 19l3.5 3.5c.3.3.7.4 1.1.4h.1c.4-.2.6-.6.5-1l-.8-3.2 1.6-1.6 2.8 8.2c.2.5.7.8 1.1.6l2.6-1.3c.4-.2.7-.6.6-1.1z"></path></svg>';
        }

        function renderTabs() {
            const upcomingCount = ticketData.filter(item => item.status === 'Upcoming').length;
            const historyCount = ticketData.filter(item => item.status === 'Completed').length;
            document.querySelectorAll('.tab').forEach(tab => {
                const key = tab.getAttribute('data-tab');
                const isActive = key === currentTab;
                tab.classList.toggle('active', isActive);
                tab.textContent = key === 'upcoming' ? `Upcoming (${upcomingCount})` : `History (${historyCount})`;
            });
        }

        function renderTickets() {
            renderTabs();
            const list = getFilteredTickets();
            const mount = document.getElementById('ticketContainer');
            if (!list.length) {
                mount.innerHTML = '';
                return;
            }

            mount.innerHTML = list.map(item => {
                const isCompleted = item.status === 'Completed';
                const fromDisplay = getDisplayLocation(item, 'from');
                const toDisplay = getDisplayLocation(item, 'to');
                return `
                    <div class="ticket-card" style="${isCompleted ? 'opacity: 0.85;' : ''}">
                        <div class="ticket-top">
                            <div class="ticket-header">
                                <div>
                                    <div class="flight-no">${escapeHtml(item.id)}</div>
                                    ${item.vehicleInfo ? `<div class="vehicle-info">${escapeHtml(item.vehicleInfo)}</div>` : ''}
                                </div>
                                <span class="ticket-date">${escapeHtml(item.date)}</span>
                            </div>
                            <div class="route-info">
                                <div class="city-group">
                                    <span class="city">${escapeHtml(fromDisplay.title)}</span>
                                    <span class="time">${escapeHtml(item.from.time)}</span>
                                    <span class="airport">${escapeHtml(fromDisplay.subtitle)}</span>
                                </div>
                                <div class="transport-line">
                                    <span class="duration">${escapeHtml(item.duration)}</span>
                                    <div class="line">
                                        <span class="icon">${renderTransportIcon(item.type)}</span>
                                    </div>
                                </div>
                                <div class="city-group right">
                                    <span class="city">${escapeHtml(toDisplay.title)}</span>
                                    <span class="time">${escapeHtml(item.to.time)}</span>
                                    <span class="airport">${escapeHtml(toDisplay.subtitle)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="ticket-divider"></div>
                        <div class="ticket-bottom">
                            <!-- 三列布局：舱位/等级 | 价格 | 座位/位置 -->
                            <div class="seat-info">
                                <div>
                                    <span class="seat-label">Type/Class</span>
                                    <span>${escapeHtml(item.class)}</span>
                                </div>
                                <div style="text-align: center;">
                                    <span class="seat-label">Amount</span>
                                    <span class="price-value">${escapeHtml(item.price || '—')}</span>
                                </div>
                                <div style="text-align: right;">
                                    <span class="seat-label">${escapeHtml(getSeatLabel(item))}</span>
                                    <span>${escapeHtml(item.seat)}</span>
                                </div>
                            </div>
                            <div style="margin-bottom: 8px;">
                                <span class="status-badge ${isCompleted ? 'status-completed' : 'status-upcoming'}">${escapeHtml(item.status)}</span>
                            </div>
                            <div class="journey-link">
                                <div>
                                    <span class="seat-label">Companion</span>
                                    <div class="journey-link-value">${escapeHtml(item.companion || '—')}</div>
                                </div>
                                <div style="text-align: right;">
                                    <span class="seat-label">Connection</span>
                                    <div class="journey-link-value">${escapeHtml(item.purpose || '—')}</div>
                                </div>
                            </div>
                            <div class="private-note">
                                <div class="note-title">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    Memo
                                </div>
                                <div class="note-content">${escapeHtml(item.note)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function resolveContext() {
            if (window.SecretCenterCore && typeof window.SecretCenterCore.resolveRoleContext === 'function') {
                const resolved = window.SecretCenterCore.resolveRoleContext();
                if (resolved && resolved.ok) return resolved;
            }
            return {
                roleId: localStorage.getItem('SecretCenter_CurrentRoleId') || '',
                roleName: localStorage.getItem('SecretCenter_CurrentRoleName') || localStorage.getItem('FangCun_CurrentRole') || '',
                personaText: '',
                worldBookText: ''
            };
        }

        function readCachedTickets(roleId) {
            if (!roleId || !window.SecretCenterCore || typeof window.SecretCenterCore.readSceneCache !== 'function') {
                return [];
            }
            const cached = window.SecretCenterCore.readSceneCache(SCENE_KEY, roleId);
            const tickets = cached && cached.data && Array.isArray(cached.data.tickets) ? cached.data.tickets : [];
            return tickets.length ? tickets : [];
        }

        function setTickets(items) {
            ticketData = Array.isArray(items) ? items : [];
            renderTickets();
        }

        function showGenerationFailure(message) {
            const reason = asString(message) || '本次没有生成出可展示的出行票根。';
            if (window.SecretCenterCore && typeof window.SecretCenterCore.showGenerationErrorDialog === 'function') {
                window.SecretCenterCore.showGenerationErrorDialog(reason, '出行票根');
                return;
            }
            alert(reason);
        }

        async function generateTickets(force) {
            const btn = document.getElementById('generateBtn');
            if (!window.SecretCenterCore || typeof window.SecretCenterCore.generateShadowItineraryContent !== 'function') {
                showGenerationFailure('核心模块未加载，暂时无法生成。');
                return;
            }
            if (!currentRoleId) {
                showGenerationFailure('请先选择角色，再生成出行票根。');
                return;
            }
            if (btn) btn.disabled = true;
            try {
                const result = await window.SecretCenterCore.generateShadowItineraryContent({
                    roleId: currentRoleId,
                    force: force === true,
                    requestOptions: {
                        temperature: 0.62,
                        maxTokens: 2200
                    }
                });
                if (result && result.ok && result.data && Array.isArray(result.data.tickets) && result.data.tickets.length) {
                    setTickets(result.data.tickets);
                    return;
                }
                showGenerationFailure(result && result.error);
            } catch (error) {
                console.error('ShadowItinerary generate failed:', error);
                showGenerationFailure(error && error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function () {
                currentTab = tab.getAttribute('data-tab');
                renderTickets();
            });
        });

        document.getElementById('generateBtn').addEventListener('click', function () {
            generateTickets(true);
        });

        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
            backBtn.addEventListener('click', function (event) {
                event.preventDefault();
                window.location.href = 'FangCun.html';
            });
        }

        (function init() {
            const context = resolveContext();
            currentRoleId = asString(context.roleId);
            updateHeaderDate();
            const cachedTickets = readCachedTickets(currentRoleId);
            setTickets(cachedTickets);
        })();
    </script>
</body>
</html>
