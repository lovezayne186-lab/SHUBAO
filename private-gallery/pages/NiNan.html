<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呢喃 - NiNan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #fff;
            overflow: hidden;
        }
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #111;
            box-shadow: -2px -2px 5px #1a1a1a, 2px 2px 5px #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #555;
            font-size: 20px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active {
            box-shadow: inset -2px -2px 5px #1a1a1a, inset 2px 2px 5px #000000;
        }
        
        /* 波形动画 */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 80px;
            margin-bottom: 60px;
        }
        .bar {
            width: 4px;
            background: #333;
            border-radius: 2px;
            transition: all 0.3s ease;
            animation: idlePulse 2s infinite ease-in-out;
        }
        .bar:nth-child(1) { height: 20px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 40px; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 60px; animation-delay: 0.0s; }
        .bar:nth-child(4) { height: 35px; animation-delay: 0.2s; }
        .bar:nth-child(5) { height: 50px; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 25px; animation-delay: 0.15s; }
        .bar:nth-child(7) { height: 45px; animation-delay: 0.35s; }
        
        @keyframes idlePulse {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(0.7); opacity: 0.8; }
        }
        
        .waveform.playing .bar {
            background: #5a6b7c;
            animation: activePulse 0.6s infinite ease-in-out alternate;
        }
        .waveform.playing .bar:nth-child(1) { animation-delay: 0.0s; }
        .waveform.playing .bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform.playing .bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform.playing .bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform.playing .bar:nth-child(5) { animation-delay: 0.4s; }
        .waveform.playing .bar:nth-child(6) { animation-delay: 0.5s; }
        .waveform.playing .bar:nth-child(7) { animation-delay: 0.6s; }

        @keyframes activePulse {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1.5); box-shadow: 0 0 8px rgba(90, 107, 124, 0.8); }
        }

        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #111;
            box-shadow: -4px -4px 10px #1a1a1a, 4px 4px 10px #000000;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .play-btn:active {
            box-shadow: inset -4px -4px 10px #1a1a1a, inset 4px 4px 10px #000000;
        }
        .play-icon {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #555;
            margin-left: 6px;
            transition: all 0.3s;
        }
        .play-btn.playing .play-icon {
            border: none;
            width: 16px;
            height: 16px;
            background: #5a6b7c;
            border-radius: 2px;
            margin-left: 0;
        }

        .dialogue-box {
            position: absolute;
            bottom: 20%;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        .dialogue-text {
            color: #4a4a4a;
            font-size: 15px;
            letter-spacing: 2px;
            line-height: 2;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(10px);
            transition: all 2s ease-in-out;
            font-style: italic;
        }
        .dialogue-text.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <a href="../private.html" class="back-btn">&lt;</a>
    
    <div class="waveform" id="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <button class="play-btn" id="playBtn">
        <div class="play-icon"></div>
    </button>

    <div class="dialogue-box">
        <div class="dialogue-text" id="dialogueText">
            “...别走...<br>我其实一直都在...”
        </div>
    </div>

    <script>
        const playBtn = document.getElementById('playBtn');
        const waveform = document.getElementById('waveform');
        const dialogueText = document.getElementById('dialogueText');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.classList.add('playing');
                waveform.classList.add('playing');
                setTimeout(() => {
                    dialogueText.classList.add('show');
                }, 800);
            } else {
                playBtn.classList.remove('playing');
                waveform.classList.remove('playing');
                dialogueText.classList.remove('show');
            }
        });
    </script>
</body>
</html>
